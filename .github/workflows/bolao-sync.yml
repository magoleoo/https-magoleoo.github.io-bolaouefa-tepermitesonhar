name: Bolao Auto-Sync

on:
  workflow_dispatch: # Execução manual para sincronizar base oficial da planilha

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para poder commitar os novos JSONs

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Exibir origem da planilha
        env:
          BOLAO_SOURCE_XLSX_URL: ${{ vars.BOLAO_SOURCE_XLSX_URL }}
        run: |
          if [ -n "$BOLAO_SOURCE_XLSX_URL" ]; then
            echo "Origem: URL remota configurada em BOLAO_SOURCE_XLSX_URL."
          else
            echo "Origem: arquivo local versionado em data/Bolao_UEFA_25_26_OFICIAL.xlsx."
          fi

      - name: Executar Sincronização do Bolão
        env:
          BOLAO_SOURCE_XLSX_URL: ${{ vars.BOLAO_SOURCE_XLSX_URL }}
        run: |
          pip install -r requirements.txt
          python tools/action_sync_excel.py
          
      - name: Commitar e Salvar JSONs Gerados
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add api/
          git commit -m "auto(bot): atualiza ranking e resultados via planilha oficial" || exit 0
          git push
